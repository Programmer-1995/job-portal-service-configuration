management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
    endpoints:
      web:
        exposure:
          include: "*"
    endpoint:
      shutdown:
        access: unrestricted
      health:
        show-details: always
    info:
      env:
        enabled: true

server:
    port: 8081

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: "http://eureka-service:8761/eureka"
    fetch-registry: true
    register-with-eureka: true

jobs:
  service:
    url: http://jobs-service:8082

companies:
  service:
    url: http://companies-service:8081

reviews:
  service:
    url: http://reviews-service:8083
    
