spring:      
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 2000
        max-attempts: 10
        multiplier: 1.5
  datasource:   
    url: jdbc:postgresql://postgresql:5432/jobs_service_db
    username: job_user
    password: Pali$8619216837
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Kolkata
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: update
    database: POSTGRESQL

management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    health:
      show-details: always
  info:
    env:
      enabled: true
server:
  port: 8082

company:
  base:
    url: http://COMPANY-SERVICE:8081/api/companies

review:
  base:
    url: http://REVIEW-SERVICE:8083/api/reviews

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: "http://eureka-service:8761/eureka"
    fetch-registry: true
    register-with-eureka: true

resilience4j:
  ratelimiter:
    instances:
      companyBreaker:
        timeout-duration: 0
        limit-refresh-period: 4
        limit-for-period: 2
  retry:
    instances:
      companyRetry:
         max-attempts: 5
         wait-duration: 2s
  circuitbreaker:
    instances:
      companyBreaker:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: count_based

jobs:
  service:
    url: http://jobs-service:8082

companies:
  service:
    url: http://companies-service:8081

reviews:
  service:
    url: http://reviews-service:8083

    
