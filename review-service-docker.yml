  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:postgresql}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DB:review_service_db}
    username: ${POSTGRESQL_USERNAME:job_user}
    password: ${POSTGRESQL_PASSWORD:Pali$8619216837}
  jpa:
      properties:
        hibernate:
          format_sql: true
          show_sql: true
          jdbc:
            time_zone: Asia/Kolkata
      hibernate:
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        ddl-auto: update

management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    health:
      show-details: always
  info:
    env:
      enabled: true

server:
    port: 8083

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: "http://eureka-service:8761/eureka"
    fetch-registry: true
    register-with-eureka: true


jobs:
  service:
    url: http://jobs-service:8082

companies:
  service:
    url: http://companies-service:8081

reviews:
  service:
    url: http://reviews-service:8083

    
